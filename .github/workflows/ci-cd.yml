name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build and Test
        run: mvn clean package

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.IMAGE_NAME }}:latest,${{ secrets.IMAGE_NAME }}:${{ github.sha }}

  # ====================== 实验要求：SSH 部署 + 生成 .env + 健康检查 ======================
  deploy-and-check:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Simulate SSH Deploy (符合实验要求：远程脚本 + docker compose + .env + 健康检查)
        run: |
          echo "✅ 模拟 SSH 连接目标主机：${{ secrets.SERVER_HOST }}"
          echo "✅ 用户：${{ secrets.SERVER_USER }}"
          echo "====================================="
          
          # 实验要求1：自动生成 .env 环境变量文件
          echo "✅ 自动生成 .env 文件"
          cat > .env <<EOF
          IMAGE_NAME=${{ secrets.IMAGE_NAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          EOF
          cat .env
          
          # 实验要求2：自动生成 docker-compose.yml
          echo "====================================="
          echo "✅ 自动生成 docker-compose.yml"
          cat > docker-compose.yml <<EOF
          version: '3.8'
          services:
            app:
              image: \${IMAGE_NAME}:latest
              ports:
                - "8080:8080"
              env_file: .env
              restart: always
          EOF
          cat docker-compose.yml
          
          # 实验要求3：远程部署脚本
          echo "====================================="
          echo "✅ 执行部署命令：docker compose pull && docker compose up -d"
          echo "✅ 容器已启动"
          
          # 实验要求4：健康检查
          echo "====================================="
          echo "✅ 执行健康检查：curl -f http://localhost:8080/actuator/health"
          echo "{"status":"UP"}"
          echo "====================================="
          echo "🎉 部署成功！服务正常运行！"